  customSections: #(optional)
    - name: Thoughts
      content: CS50 was my introduction to the foundations of computer science and played a significant role in shaping my journey as a developer. <br/> Beyond the technical knowledge, it sparked a genuine enthusiasm for computer science and gave me the confidence to continue learning independently. <br/> I thoroughly enjoyed every part of the course and cannot recommend it highly enough to anyone interested in exploring computer science, whether they are complete beginners or looking to strengthen their fundamentals.



